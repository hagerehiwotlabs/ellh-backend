spring.application.name=ellh-backend

# Actuator — Render.com health check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# JWT
jwt.access-token-expiry-hours=24
jwt.refresh-token-expiry-days=30
jwt.secret=${JWT_SECRET}

# AI Gateway
ai.gateway.timeout-seconds=5
ai.gateway.circuit-breaker.failure-threshold=5
ai.gateway.circuit-breaker.wait-duration-seconds=30
ai.request-queue.overflow-threshold=0.8
ai.gateway.colab-primary-url=${COLAB_PRIMARY_URL:http://localhost:5000}
ai.gateway.colab-overflow-url=${COLAB_OVERFLOW_URL:http://localhost:5001}
ai.gateway.hugging-face-api-key=${HUGGING_FACE_API_KEY:}

# ──────────────────────────────────────────────────────────────────────────────
# S3-COMPATIBLE CLOUD STORAGE (AWS S3, Supabase, Cloudflare R2)
# ──────────────────────────────────────────────────────────────────────────────
# Uses environment variables if present, otherwise defaults to local mock values
# to guarantee successful local compilation and startup.
cloud.s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
cloud.s3.region=${S3_REGION:us-east-1}
cloud.s3.access-key=${S3_ACCESS_KEY:local-development-access-key}
cloud.s3.secret-key=${S3_SECRET_KEY:local-development-secret-key-must-be-long}
cloud.s3.bucket-name=${S3_BUCKET_NAME:ellh-recordings-dev}
cloud.s3.cdn-url=${S3_CDN_URL:http://localhost:9000/ellh-recordings-dev}
