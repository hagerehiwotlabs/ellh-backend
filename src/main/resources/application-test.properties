# TEST PROFILE — used by CI (GitHub Actions) and local mvn test
# Testcontainers overrides datasource/redis/mongodb via @DynamicPropertySource
spring.datasource.url=${TEST_DATABASE_URL:jdbc:postgresql://localhost:5432/ellh_test}
spring.datasource.username=${TEST_DB_USERNAME:postgres}
spring.datasource.password=${TEST_DB_PASSWORD:test_password}
spring.datasource.hikari.maximum-pool-size=3

spring.jpa.hibernate.ddl-auto=validate

spring.data.mongodb.uri=${TEST_MONGODB_URI:mongodb://localhost:27017/ellh_test}

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

ai.service.active-provider=mock

jwt.secret=${JWT_SECRET:test_jwt_secret_minimum_32_chars_long_for_hmac}

management.security.enabled=false

logging.level.com.ellh=INFO
logging.level.org.flywaydb=DEBUG
