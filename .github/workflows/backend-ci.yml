name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test, and Coverage Check
    runs-on: ubuntu-latest
    # NO services block — Testcontainers in AbstractIntegrationTest
    # manages all DB containers on random ports. CI services on fixed
    # ports conflict with Testcontainers and are never actually used.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: maven }
      - name: Run tests and verify
        run: mvn verify -B -e
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: test_jwt_secret_minimum_32_chars_long_for_hmac
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with: { name: jacoco-report, path: target/site/jacoco/ }

  verify-docker-build:
    name: Verify Dockerfile Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ellh-backend:ci .

  deploy:
    name: Deploy to Render.com
    needs: [build-and-test, verify-docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}"
      - name: Wait for deployment health
        run: |
          MAX=18; ATTEMPT=0
          until [ $ATTEMPT -ge $MAX ]; do
            ATTEMPT=$((ATTEMPT+1))
            STATUS=$(curl -s --max-time 10 \
              https://ellh-backend.onrender.com/actuator/health \
              | jq -r '.status' 2>/dev/null || echo "UNREACHABLE")
            [ "$STATUS" = "UP" ] && echo "Healthy after $((ATTEMPT*10))s" && exit 0
            echo "Attempt $ATTEMPT/$MAX: $STATUS — retry in 10s"; sleep 10
          done
          echo "Health check failed after 3 minutes"; exit 1
